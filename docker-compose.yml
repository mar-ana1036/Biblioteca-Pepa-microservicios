version: '3.8'

services:

  usuarios:
    build: ./usuarios
    environment:
      DB_HOST: 192.168.100.2
      DB_PASSWORD: ana
      DB_NAME: usuarios_db
    ports:
      - "3001"
    restart: always

  libros:
    build: ./libros
    environment:
      DB_HOST: 192.168.100.2
      DB_PASSWORD: ana
      DB_NAME: libros_db
    ports:
      - "3002"
    restart: always

  prestamos:
    build: ./prestamos
    environment:
      DB_HOST: 192.168.100.2
      DB_PASSWORD: ana
      DB_NAME: prestamos_db
    ports:
      - "3003"
    restart: always

  haproxy:
    image: haproxy:2.8
    ports:
      - "3001:3001"
      - "3002:3002"
      - "3003:3003"
      - "8404:8404"
    volumes:
      - ./haproxy.cfg:/usr/local/etc/haproxy/haproxy.cfg:ro
    depends_on:
      - usuarios
      - libros
      - prestamos
    restart: always

